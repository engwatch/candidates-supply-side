<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supply-side кандидаты</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.lock-card{background:#fff;border-radius:16px;padding:40px;box-shadow:0 4px 24px rgba(0,0,0,0.1);text-align:center;max-width:380px;width:90%}
.lock-icon{font-size:48px;margin-bottom:16px}
h2{font-size:18px;color:#333;margin-bottom:8px}
p{font-size:13px;color:#888;margin-bottom:24px}
input[type=password]{width:100%;padding:12px 16px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;outline:none;transition:border .2s}
input[type=password]:focus{border-color:#3498db}
button{width:100%;padding:12px;background:#2ecc71;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;transition:background .2s}
button:hover{background:#27ae60}
.error{color:#e74c3c;font-size:13px;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="lock-card">
<div class="lock-icon">&#128274;</div>

function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function decrypt(){
try{
const enc=new TextEncoder();
const pwd=enc.encode(document.getElementById("pwd").value);
const salt=b64d(SALT),iv=b64d(IV),ct=b64d(CT);
const km=await crypto.subtle.importKey("raw",pwd,"PBKDF2",false,["deriveKey"]);
const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
const html=new TextDecoder().decode(pt);
document.open();document.write(html);document.close();
}catch(e){document.getElementById("err").style.display="block"}
}
document.getElementById("pwd").addEventListener("keydown",e=>{if(e.key==="Enter")decrypt()});
</script>
